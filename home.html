<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HillBeats</title>
  <meta name="description" content="HillBeats – Dein Musik-Label aus den Hügeln. Aktuelle Releases, Tour-Dates und mehr.">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- NAVIGATION -->
<nav id="navbar" role="navigation" aria-label="Hauptnavigation">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo" aria-label="HillBeats – Startseite">
      <img src="assets/img/logo.svg" alt="HillBeats Logo">
    </a>
    <button class="burger" id="burger" aria-label="Menü öffnen" aria-expanded="false" aria-controls="nav-links" data-i18n-aria="nav.burgerLabel">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="#hero"       data-i18n="nav.home">Startseite</a></li>
      <li><a href="#release"    data-i18n="nav.release">Release</a></li>
      <li><a href="#about"      data-i18n="nav.about">Über uns</a></li>
      <li><a href="#media"      data-i18n="nav.media">Media</a></li>
      <li><a href="#tour"       data-i18n="nav.tour">Tour</a></li>
      <li><a href="#contact"    data-i18n="nav.contact">Kontakt</a></li>
    </ul>
    <!-- Language dropdown -->
    <div class="lang-dropdown" id="lang-dropdown">
      <button class="lang-btn" id="lang-btn"
              aria-haspopup="listbox" aria-expanded="false"
              aria-label="Sprache wählen" data-i18n-aria="lang.label">
        <span id="lang-current">DE</span>
        <svg aria-hidden="true" width="12" height="8" viewBox="0 0 12 8" focusable="false">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <ul class="lang-list" id="lang-list" role="listbox" aria-label="Sprache">
        <li role="option" data-lang="de" aria-selected="true"  tabindex="0">🇩🇪 DE</li>
        <li role="option" data-lang="en" aria-selected="false" tabindex="0">🇬🇧 EN</li>
      </ul>
    </div>
  </div>
</nav>
