<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Somniatores</title>
  <meta name="description" content="Somniatores die Band die eine bessere Welt schafft">
  <link rel="icon" type="image/png" href="assets/img/band_logo.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/app.js" defer></script>
</head>
<body>

<!-- PROJECT NOTICE (FFH Mediencamp) -->
<div class="project-notice" role="note">
   Ein Projekt des FFH Mediencamps.
</div>

<!-- NAVIGATION -->
<nav id="navbar" role="navigation" aria-label="Hauptnavigation">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo" aria-label="Somniatores – Startseite">
      <img src="assets/img/band_logo.png" alt="Somniatores Logo">
    </a>
    <button class="burger" id="burger" aria-label="Menü öffnen" aria-expanded="false" aria-controls="nav-links" data-i18n-aria="nav.burgerLabel">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="#hero"              data-i18n="nav.home">Startseite</a></li>
      <li><a href="pages/releases.html" data-i18n="nav.releases">Releases</a></li>
      <li><a href="#about"            data-i18n="nav.about">Über uns</a></li>
      <li><a href="#media"            data-i18n="nav.media">Media</a></li>
    </ul>
    <!-- Language dropdown -->
    <div class="lang-dropdown" id="lang-dropdown">
      <button class="lang-btn" id="lang-btn"
              aria-haspopup="listbox" aria-expanded="false"
              aria-label="Sprache wählen" data-i18n-aria="lang.label">
        <span id="lang-current">DE</span>
        <svg aria-hidden="true" width="12" height="8" viewBox="0 0 12 8" focusable="false">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <ul class="lang-list" id="lang-list" role="listbox" aria-label="Sprache">
        <li role="option" data-lang="de" aria-selected="true"  tabindex="0">🇩🇪 DE</li>
        <li role="option" data-lang="en" aria-selected="false" tabindex="0">🇬🇧 EN</li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="hero-bg">
    <img class="hero-bg-img"
         src="assets/img/band_logo.png"
         alt="">
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <img class="hero-band-logo" src="assets/img/band_logo.png" alt="Somniatores Logo">
    <h1 data-i18n="hero.title">Sominatores</h1>
    <p class="slogan" data-i18n="hero.slogan">A better world</p>
    <div class="hero-buttons">
      <a href="#release" class="btn btn-primary"   data-i18n="hero.listen">Jetzt Hören</a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="assets/img/Logo_Huegel.jpeg" alt="HillBeats Logo">
        <p class="footer-slogan" data-i18n="footer.slogan">Sound der Hügel</p>
      </div>
      <nav class="footer-nav" aria-label="Footer Navigation">
        <a href="#hero"              data-i18n="nav.home">Startseite</a>
        <a href="#release"          data-i18n="nav.release">Release</a>
        <a href="pages/releases.html" data-i18n="nav.releases">Releases</a>
        <a href="#about"            data-i18n="nav.about">Über uns</a>
        <a href="#media"            data-i18n="nav.media">Media</a>
      </nav>
      <p class="footer-copy" data-i18n="footer.copy">© 2026 HillBeats. Alle Rechte vorbehalten.</p>
    </div>
  </div>
</footer>

</body>
</html>
